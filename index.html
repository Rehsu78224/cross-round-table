<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Cross Round Table
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
padding:20px;
background:#FFF8F1;
font-family:
"Microsoft JhengHei",
sans-serif;
}

.container{
max-width:1200px;
margin:auto;
}

.title{
text-align:center;
font-size:72px;
font-weight:900;
color:#143A84;
margin-bottom:10px;
}

.banner{
text-align:center;
background:#FFF2D8;
padding:16px;
border-radius:40px;
font-size:24px;
font-weight:bold;
max-width:760px;
margin:auto;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:22px;
}

.card{
background:white;
border-radius:35px;
padding:24px;
position:relative;
box-shadow:
0 8px 24px rgba(0,0,0,.08);
min-height:340px;
overflow:hidden;
}

.label{
font-size:46px;
font-weight:bold;
margin-bottom:10px;
}

.red{
color:#FF5F6D;
}

.green{
color:#70B84D;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.desc{
font-size:18px;
margin-bottom:18px;
line-height:1.6;
}

textarea,
input{

width:100%;
border:3px dashed #E5E5E5;
border-radius:24px;
padding:24px;
font-size:28px;
line-height:1.8;
height:160px;
overflow:auto;
white-space:pre-wrap;
box-sizing:border-box;
background:white;
font-family:
"Microsoft JhengHei",
sans-serif;
resize:none;
outline:none;

}

input{
height:80px;
}

.cat{
position:absolute;
right:18px;
bottom:18px;
width:88px;
}

.bottom{
text-align:center;
margin-top:40px;
}

button{
background:#143A84;
color:white;
border:none;
padding:18px 42px;
font-size:24px;
font-weight:bold;
border-radius:20px;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.notice{
margin-top:16px;
font-size:16px;
color:#777;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.title{
font-size:46px;
}

.label{
font-size:38px;
}

textarea,
input{
font-size:24px;
height:150px;
}

input{
height:70px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">

🐱 CROSS ROUND TABLE ☕

</div>

<div class="banner">

每一次交流，都可能成為未來合作的起點！

</div>

<div class="grid">

<div class="card">

<div class="label red">

❤️ 感想

</div>

<div class="desc">

用一句話說說，今天參加活動的感受吧！

</div>

<textarea
id="feeling"
placeholder="請輸入..."></textarea>

<img
class="cat"
src="./images/cat-sleep.png">

</div>


<div class="card">

<div class="label green">

🔍 發現

</div>

<div class="desc">

今天有沒有發現以前不知道的事或觀點呢？

</div>

<textarea
id="discovery"
placeholder="請輸入..."></textarea>

<img
class="cat"
src="./images/cat-search.png">

</div>


<div class="card">

<div class="label orange">

🎁 意外收穫

</div>

<div class="desc">

今天讓你覺得最意外、最有收穫的是什麼呢？

</div>

<textarea
id="surprise"
placeholder="請輸入..."></textarea>

<img
class="cat"
src="./images/cat-coffee.png">

</div>


<div class="card">

<div class="label blue">

👥 認識到的人

</div>

<div class="desc">

今天認識了哪些新朋友？可以寫下名字或部門喔！

</div>

<textarea
id="people"
placeholder="請輸入..."></textarea>

<img
class="cat"
src="./images/cat-happy.png">

</div>

</div>


<div class="bottom">

<button onclick="submitForm()">

🎉 匿名送出

</button>

<div class="notice">

※ 不會記錄姓名與帳號，請安心分享

</div>

</div>

</div>


<script>

const supabaseUrl =
'https://cvnhchajerbqaalxjtjo.supabase.co'

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2bmhjaGFqZXJicWFhbHhqdGpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDg4OTksImV4cCI6MjA5NDM4NDg5OX0.7XCE9ZpG5FCkCQMV5uLPq2fJ9CgMUl-7fIrWuuq4XxU'

const client =
window.supabase.createClient(
supabaseUrl,
supabaseKey
)

async function submitForm(){

const feeling =
document
.getElementById('feeling')
.value
.trim()

const discovery =
document
.getElementById('discovery')
.value
.trim()

const surprise =
document
.getElementById('surprise')
.value
.trim()

const people =
document
.getElementById('people')
.value
.trim()

if(
!feeling ||
!discovery ||
!surprise ||
!people
){

alert('請完整填寫所有欄位')

return

}

const {
error
} =
await client
.from('responses')
.insert([
{
feeling,
discovery,
surprise,
people
}
])

if(error){

console.log(error)

alert(
'送出失敗：' +
error.message
)

return

}

alert('送出成功！')

document
.getElementById('feeling')
.value=''

document
.getElementById('discovery')
.value=''

document
.getElementById('surprise')
.value=''

document
.getElementById('people')
.value=''

}

</script>

</body>

</html>

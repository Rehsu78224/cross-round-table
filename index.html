<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cross Round Table</title>

<style>

body{
margin:0;
padding:20px;
background:#FFF8F1;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
}

.card{

width:100%;
max-width:1100px;

background:white;

padding:35px;

border-radius:35px;

position:relative;

box-shadow:0 8px 25px rgba(0,0,0,.08);

overflow:hidden;

}


/* 左上貓 */

.topCat{

position:absolute;
left:20px;
top:20px;

}

.topCat img{

width:120px;

}


/* 標題 */

.title{

font-size:65px;
font-weight:bold;
color:#143A84;

text-align:center;

margin-top:10px;
margin-bottom:25px;

}


/* 橫條訊息 */

.banner{

display:flex;

justify-content:center;

margin-bottom:40px;

}

.bannerText{

background:#FFF2D8;

padding:14px 40px;

border-radius:30px;

font-size:18px;

font-weight:bold;

color:#444;

}


/* 區塊 */

.section{

position:relative;

margin-bottom:45px;

}

.sectionTitle{

font-size:32px;
font-weight:bold;

margin-bottom:5px;

}

.red{
color:#FF6B6B;
}

.green{
color:#5CB85C;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}


/* 說明文字 */

.desc{

font-size:16px;

color:#666;

margin-bottom:15px;

}


/* 輸入框 */

.inputArea{

position:relative;

}

textarea,input{

width:100%;

box-sizing:border-box;

padding:20px;

border-radius:25px;

border:2px dashed #E5E5E5;

background:#FAFAFA;

font-size:18px;

resize:none;

}


/* 小貓 */

.smallCat{

position:absolute;

right:20px;
bottom:10px;

}

.smallCat img{

width:90px;

}


/* 按鈕 */

button{

width:100%;

padding:20px;

border:none;

border-radius:25px;

background:#153C91;

color:white;

font-size:28px;

font-weight:bold;

cursor:pointer;

margin-top:20px;

}


/* 底部 */

.bottom{

display:flex;

justify-content:space-between;

margin-top:25px;

}

.bottom img{

width:90px;

}


/* 手機版 */

@media(max-width:768px){

.title{

font-size:35px;

margin-top:90px;

}

.topCat img{

width:80px;

}

.smallCat img{

width:60px;

}

.bannerText{

font-size:14px;

padding:10px 15px;

}

}

</style>

</head>

<body>

<form class="card" onsubmit="return validateForm()">

<div class="topCat">

<img src="./images/cat-coffee.png">

</div>


<div class="title">

CROSS ROUND TABLE

</div>


<div class="banner">

<div class="bannerText">

🐾 每一次交流 都可能成為未來合作的起點！

</div>

</div>


<!-- 感想 -->

<div class="section">

<div class="sectionTitle red">

❤️ 感想

</div>

<div class="desc">

用一句話說說，今天參加活動的感受吧！

</div>

<div class="inputArea">

<textarea required rows="4"
placeholder="請輸入..."></textarea>

<div class="smallCat">

<img src="./images/cat-sleep.png">

</div>

</div>

</div>



<!-- 發現 -->

<div class="section">

<div class="sectionTitle green">

🔍 發現

</div>

<div class="desc">

今天有沒有發現以前不知道的事或觀點呢？

</div>

<div class="inputArea">

<textarea required rows="4"
placeholder="請輸入..."></textarea>

<div class="smallCat">

<img src="./images/cat-search.png">

</div>

</div>

</div>



<!-- 意外收穫 -->

<div class="section">

<div class="sectionTitle orange">

🎁 意外收穫

</div>

<div class="desc">

今天讓你覺得最意外、最有收穫的是什麼呢？

</div>

<div class="inputArea">

<textarea required rows="4"
placeholder="請輸入..."></textarea>

<div class="smallCat">

<img src="./images/cat-happy.png">

</div>

</div>

</div>



<!-- 認識到的人 -->

<div class="section">

<div class="sectionTitle blue">

👥 認識到的人

</div>

<div class="desc">

今天認識了哪些新朋友呢？可以寫下名字或部門喔！

</div>

<input required
placeholder="請輸入...">

</div>



<button type="submit">

🎉 匿名送出

</button>



<div class="bottom">

<img src="./images/yarn.png">

<img src="./images/paws-hearts.png">

</div>

</form>


<script>

function validateForm(){

alert("🎉 感謝分享！");

return false;

}

</script>

</body>

</html>

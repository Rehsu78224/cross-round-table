<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cross Round Table</title>

<style>
body{
font-family:Arial;
background:#FFF7ED;
padding:20px;
}

.card{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea,input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:15px;
background:#1e3a8a;
color:white;
font-size:18px;
}
</style>

</head>

<body>

<div class="card">

<h1>CROSS ROUND TABLE</h1>
<p>匿名分享今天的收穫</p>

<h3>❤️ 感想</h3>
<textarea rows="3"></textarea>

<h3>🔍 發現</h3>
<textarea rows="3"></textarea>

<h3>🎁 意外收穫</h3>
<textarea rows="3"></textarea>

<h3>👥 認識到的人</h3>
<input placeholder="IT｜咖啡">

<button>🎉送出</button>

</div>

</body>
</html>

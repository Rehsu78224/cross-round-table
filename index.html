<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cross Round Table</title>

<style>

body{
margin:0;
padding:20px;
background:#FFF8F1;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
}

.card{

position:relative;

width:100%;
max-width:900px;

background:white;

padding:40px;

border-radius:35px;

box-shadow:0 8px 30px rgba(0,0,0,.08);

overflow:hidden;

}

.title{

font-size:60px;
font-weight:bold;
color:#243B73;
text-align:center;
margin-top:30px;
margin-bottom:60px;

}

.topCat{

position:absolute;
left:10px;
top:15px;

}

.topCat img{

width:170px;

}

.rightBubble{

position:absolute;
right:20px;
top:100px;

background:#FFF0D5;
padding:18px;
border-radius:25px;

width:200px;

font-size:16px;

line-height:1.8;

}

.section{

position:relative;

margin-bottom:35px;

}

.sectionTitle{

font-size:30px;
font-weight:bold;
margin-bottom:10px;

}

.red{color:#FF6B6B;}
.green{color:#68B85F;}
.orange{color:#FFAA33;}
.blue{color:#5A8DEE;}

textarea,input{

width:100%;
box-sizing:border-box;

padding:18px;

border-radius:20px;

border:2px solid #EFEFEF;

font-size:16px;

background:#FAFAFA;

resize:none;

}

.catRight{

position:absolute;
right:20px;
bottom:10px;

}

.catRight img{

width:120px;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:20px;

background:#243B73;

color:white;

font-size:22px;

font-weight:bold;

cursor:pointer;

}

.bottom{

display:flex;

justify-content:space-between;

margin-top:30px;

align-items:center;

}

.bottom img{

width:120px;

}

@media(max-width:768px){

.title{
font-size:35px;
}

.topCat img{
width:100px;
}

.rightBubble{

position:static;
width:auto;
margin-bottom:20px;

}

.catRight img{

width:70px;

}

.bottom img{

width:80px;

}

}

</style>

</head>

<body>

<div class="card">

<div class="topCat">

<img src="./images/cat-coffee.png">

</div>


<div class="title">

CROSS ROUND TABLE ☕

</div>


<div class="rightBubble">

🐱 每一次交流<br>
都可能成為未來合作的起點！

</div>



<div class="section">

<div class="sectionTitle red">

❤️ 感想

</div>

<textarea rows="4"
placeholder="今天讓你印象最深刻的是..."></textarea>

<div class="catRight">

<img src="./images/cat-sleep.png">

</div>

</div>



<div class="section">

<div class="sectionTitle green">

🔍 發現

</div>

<textarea rows="4"
placeholder="今天發現了什麼新的觀點..."></textarea>

<div class="catRight">

<img src="./images/cat-search.png">

</div>

</div>



<div class="section">

<div class="sectionTitle orange">

🎁 意外收穫

</div>

<textarea rows="4"
placeholder="今天最大的收穫是..."></textarea>

<div class="catRight">

<img src="./images/cat-happy.png">

</div>

</div>



<div class="section">

<div class="sectionTitle blue">

👥 認識到的人

</div>

<input
placeholder="部門｜關鍵字，例如：IT｜咖啡">

</div>


<button>

🎉 匿名送出

</button>


<div class="bottom">

<img src="./images/yarn.png">

<img src="./images/paws-hearts.png">

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cross Round Table</title>

<style>

body{
margin:0;
padding:20px;
background:#FFF8F1;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
}

.card{
position:relative;
width:100%;
max-width:850px;
background:white;
padding:35px;
border-radius:35px;
box-shadow:0 8px 30px rgba(0,0,0,.08);
overflow:hidden;
}

.title{
font-size:55px;
font-weight:bold;
text-align:center;
color:#243B73;
margin-top:20px;
margin-bottom:40px;
}

.rightBubble{

position:absolute;
right:20px;
top:100px;

background:#FFF0D5;
padding:18px;
border-radius:25px;
width:180px;
font-size:16px;
line-height:1.6;

}

.paw{
position:absolute;
font-size:30px;
opacity:.25;
}

.p1{
left:30px;
top:20px;
}

.p2{
right:260px;
top:20px;
}

.section{
margin-bottom:30px;
}

.sectionTitle{
font-size:30px;
font-weight:bold;
margin-bottom:10px;
}

.red{
color:#FF6B6B;
}

.green{
color:#68B85F;
}

.orange{
color:#FFAA33;
}

.blue{
color:#5A8DEE;
}

textarea,input{

width:100%;
box-sizing:border-box;
padding:18px;
border-radius:20px;
border:2px solid #EFEFEF;
font-size:16px;
background:#FAFAFA;
resize:none;

}

button{

width:100%;
padding:18px;
border:none;
border-radius:20px;
background:#243B73;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;

}

@media(max-width:768px){

.title{
font-size:36px;
}

.rightBubble{

position:static;
width:auto;
margin-bottom:20px;

}

}

</style>

</head>

<body>

<div class="card">

<div class="paw p1">🐾</div>
<div class="paw p2">🐾</div>

<div class="title">

CROSS ROUND TABLE

</div>

<div class="rightBubble">

🐱 每一次交流<br>
都可能成為未來合作的起點！

</div>


<div class="section">

<div class="sectionTitle red">

❤️ 感想

</div>

<textarea rows="4"
placeholder="今天讓你印象最深刻的是..."></textarea>

</div>


<div class="section">

<div class="sectionTitle green">

🔍 發現

</div>

<textarea rows="4"
placeholder="今天發現了什麼新的觀點..."></textarea>

</div>


<div class="section">

<div class="sectionTitle orange">

🎁 意外收穫

</div>

<textarea rows="4"
placeholder="今天最大的收穫是..."></textarea>

</div>


<div class="section">

<div class="sectionTitle blue">

👥 認識到的人

</div>

<input
placeholder="部門｜關鍵字，例如：IT｜咖啡">

</div>


<button>

🎉 匿名送出

</button>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cross Round Table</title>

<style>

body{
margin:0;
padding:20px;
background:#FFF7ED;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
}

.card{
width:100%;
max-width:900px;
background:white;
padding:30px;
border-radius:35px;
position:relative;
box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.title{
font-size:60px;
font-weight:bold;
text-align:center;
color:#3A2A22;
}

.subtitle{
text-align:center;
font-size:24px;
margin-top:10px;
color:#666;
}

.quote{
position:absolute;
top:120px;
right:30px;
background:#FFF4D6;
padding:15px;
border-radius:20px;
width:180px;
font-size:18px;
}

.section{
margin-top:30px;
}

.sectionTitle{
font-size:35px;
font-weight:bold;
margin-bottom:10px;
}

textarea,input{
width:100%;
box-sizing:border-box;
padding:20px;
border-radius:25px;
border:2px solid #eee;
font-size:18px;
}

.cat{
font-size:70px;
position:absolute;
left:20px;
top:100px;
}

.footer{
margin-top:40px;
background:#FFF4D6;
padding:20px;
border-radius:20px;
text-align:center;
font-size:20px;
}

</style>
</head>

<body>

<div class="card">

<div class="title">
CROSS ROUND TABLE
</div>

<div class="subtitle">
匿名分享今天的收穫 💕
</div>

<div class="cat">
🐱☕
</div>

<div class="quote">
每一次交流<br>
都可能成為未來合作的起點！
</div>


<div class="section">

<div class="sectionTitle">
❤️ 感想
</div>

<textarea rows="4"
placeholder="今天讓你印象最深刻的是..."></textarea>

</div>


<div class="section">

<div class="sectionTitle">
🔍 發現
</div>

<textarea rows="4"
placeholder="你發現了什麼新的觀點..."></textarea>

</div>


<div class="section">

<div class="sectionTitle">
🎁 意外收穫
</div>

<textarea rows="4"
placeholder="今天最大的收穫..."></textarea>

</div>


<div class="section">

<div class="sectionTitle">
👥 認識到的人
</div>

<input
placeholder="部門｜關鍵字">

</div>


<div style="margin-top:30px">

<button style="
width:100%;
padding:20px;
font-size:25px;
border:none;
border-radius:20px;
background:#1D3BAA;
color:white;
">

🎉 匿名送出

</button>

</div>

<div class="footer">

</div>

</div>

</body>
</html>

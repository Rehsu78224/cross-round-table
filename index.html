<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cross Round Table</title>

<style>

body{
margin:0;
padding:20px;
background:#FFF8F1;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
}

.card{

width:100%;
max-width:900px;

background:white;

padding:35px;

border-radius:35px;

position:relative;

box-shadow:0 8px 25px rgba(0,0,0,.08);

overflow:hidden;

}

.topCat{

position:absolute;
left:20px;
top:20px;

}

.topCat img{

width:90px;

}

.title{

font-size:52px;
font-weight:bold;
color:#243B73;

text-align:center;

padding-left:90px;
padding-right:220px;

margin-top:25px;
margin-bottom:60px;

}

.rightBubble{

position:absolute;

right:20px;
top:30px;

background:#FFF0D5;

padding:16px;

border-radius:25px;

width:220px;

font-size:15px;

line-height:1.7;

}

.section{

position:relative;

margin-bottom:35px;

}

.sectionTitle{

font-size:30px;
font-weight:bold;
margin-bottom:10px;

}

.red{
color:#FF6B6B;
}

.green{
color:#69B95B;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.inputArea{

position:relative;

}

textarea,input{

width:100%;
box-sizing:border-box;

padding:18px;

border-radius:20px;

border:2px solid #EFEFEF;

background:#FAFAFA;

font-size:16px;

resize:none;

}

.smallCat{

position:absolute;

right:15px;
bottom:10px;

}

.smallCat img{

width:65px;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:20px;

background:#243B73;

color:white;

font-size:22px;

font-weight:bold;

cursor:pointer;

margin-top:20px;

}

.bottom{

display:flex;

justify-content:space-between;

margin-top:20px;

padding:0 20px;

}

.bottom img{

width:70px;

}

@media(max-width:768px){

.title{

font-size:32px;

padding-left:0;
padding-right:0;

margin-top:100px;

}

.topCat img{

width:70px;

}

.rightBubble{

position:static;

width:auto;

margin-bottom:20px;

}

.smallCat img{

width:50px;

}

}

</style>

</head>

<body>

<form class="card" onsubmit="return validateForm()">

<div class="topCat">

<img src="./images/cat-coffee.png">

</div>


<div class="rightBubble">

🐱 每一次交流<br>
都可能成為未來合作的起點！

</div>


<div class="title">

CROSS ROUND TABLE

</div>


<div class="section">

<div class="sectionTitle red">

❤️ 感想

</div>

<div class="inputArea">

<textarea required rows="4"
placeholder="今天讓你印象最深刻的是..."></textarea>

<div class="smallCat">

<img src="./images/cat-sleep.png">

</div>

</div>

</div>



<div class="section">

<div class="sectionTitle green">

🔍 發現

</div>

<div class="inputArea">

<textarea required rows="4"
placeholder="今天發現了什麼新的觀點..."></textarea>

<div class="smallCat">

<img src="./images/cat-search.png">

</div>

</div>

</div>



<div class="section">

<div class="sectionTitle orange">

🎁 意外收穫

</div>

<div class="inputArea">

<textarea required rows="4"
placeholder="今天最大的收穫是..."></textarea>

<div class="smallCat">

<img src="./images/cat-happy.png">

</div>

</div>

</div>



<div class="section">

<div class="sectionTitle blue">

👥 認識到的人

</div>

<input required
placeholder="部門｜關鍵字，例如：IT｜咖啡">

</div>



<button type="submit">

🎉 匿名送出

</button>


<div class="bottom">

<img src="./images/yarn.png">

<img src="./images/paws-hearts.png">

</div>

</form>


<script>

function validateForm(){

alert("🎉 感謝分享！");

return false;

}

</script>

</body>

</html>

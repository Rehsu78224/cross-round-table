<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Cross Round Table
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
padding:24px;

background:#FFF8F1;

font-family:
"Microsoft JhengHei",
sans-serif;

}

.container{

max-width:1280px;

margin:auto;

}

.title{

text-align:center;

font-size:68px;

font-weight:900;

color:#143A84;

line-height:1.1;

margin-bottom:18px;

}

.banner{

text-align:center;

background:#FFF2D8;

padding:18px 28px;

border-radius:999px;

font-size:24px;

font-weight:bold;

max-width:760px;

margin:auto;

margin-bottom:40px;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:26px;

}

.card{

background:white;

border-radius:34px;

padding:26px;

position:relative;

box-shadow:
0 8px 26px rgba(0,0,0,.08);

min-height:340px;

overflow:hidden;

}

.label{

font-size:48px;

font-weight:900;

margin-bottom:12px;

line-height:1;

}

.red{
color:#FF5F6D;
}

.green{
color:#70B84D;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.purple{
color:#9B59B6;
}

.desc{

font-size:18px;

line-height:1.7;

margin-bottom:18px;

color:#444;

}

textarea{

width:100%;

height:170px;

border:3px dashed #E5E5E5;

border-radius:24px;

padding:24px;

font-size:28px;

line-height:1.8;

background:white;

resize:none;

outline:none;

font-family:
"Microsoft JhengHei",
sans-serif;

}

textarea:focus{

border-color:#143A84;

}

.cat{

position:absolute;

right:18px;

bottom:18px;

width:88px;

pointer-events:none;

}

.rating-card{

background:white;

border-radius:34px;

padding:28px;

box-shadow:
0 8px 26px rgba(0,0,0,.08);

margin-top:30px;

text-align:center;

}

.star-rating{

display:flex;

flex-direction:row-reverse;

justify-content:center;

gap:12px;

margin-top:24px;

}

.star-rating input{

display:none;

}

.star-rating label{

font-size:72px;

color:#E0E0E0;

cursor:pointer;

transition:.2s;

line-height:1;

}

.star-rating label:hover,
.star-rating label:hover ~ label{

color:#FFD84D;

transform:scale(1.08);

}

.star-rating input:checked ~ label{

color:#FFD84D;

}

.bottom{

text-align:center;

margin-top:40px;

}

button{

background:#143A84;

color:white;

border:none;

padding:20px 52px;

font-size:26px;

font-weight:bold;

border-radius:22px;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:scale(1.05);

}

.notice{

margin-top:16px;

font-size:16px;

color:#777;

}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.title{
font-size:46px;
}

.label{
font-size:38px;
}

textarea{
font-size:24px;
height:150px;
}

.star-rating label{
font-size:56px;
}

button{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">

🐱 CROSS ROUND TABLE ☕

</div>

<div class="banner">

每一次交流，都可能成為未來合作的起點！

</div>


<div class="grid">


<div class="card">

<div class="label red">

❤️ 感想

</div>

<div class="desc">

用一句話說說，今天參加活動的感受吧！

</div>

<textarea
id="feeling"
placeholder="請輸入..."></textarea>

<img
class="cat"
src="./images/cat-sleep.png">

</div>



<div class="card">

<div class="label green">

🔍 發現

</div>

<div class="desc">

今天有沒有發現以前不知道的事或觀點呢？

</div>

<textarea
id="discovery"
placeholder="請輸入..."></textarea>

<img
class="cat"
src="./images/cat-search.png">

</div>



<div class="card">

<div class="label orange">

🎁 意外收穫

</div>

<div class="desc">

今天讓你覺得最意外、最有收穫的是什麼呢？

</div>

<textarea
id="surprise"
placeholder="請輸入..."></textarea>

<img
class="cat"
src="./images/cat-coffee.png">

</div>



<div class="card">

<div class="label blue">

👥 認識到的人

</div>

<div class="desc">

今天認識了哪些新朋友？可以寫下名字或部門喔！

</div>

<textarea
id="people"
placeholder="請輸入..."></textarea>

<img
class="cat"
src="./images/cat-happy.png">

</div>

</div>



<div class="rating-card">

<div class="label purple">

⭐ 滿意度調查

</div>

<div class="desc">

請為今天的活動整體滿意度打分數

</div>

<div class="star-rating">

<input type="radio" id="star5" name="rating" value="5">
<label for="star5">★</label>

<input type="radio" id="star4" name="rating" value="4">
<label for="star4">★</label>

<input type="radio" id="star3" name="rating" value="3">
<label for="star3">★</label>

<input type="radio" id="star2" name="rating" value="2">
<label for="star2">★</label>

<input type="radio" id="star1" name="rating" value="1">
<label for="star1">★</label>

</div>

</div>



<div class="bottom">

<button onclick="submitForm()">

🎉 匿名送出

</button>

<div class="notice">

※ 不會記錄姓名與帳號，請安心分享

</div>

</div>

</div>



<script>

const supabaseUrl =
'https://cvnhchajerbqaalxjtjo.supabase.co'

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInR5cCI6IkpXVCJ9'

const client =
window.supabase.createClient(
supabaseUrl,
supabaseKey
)

async function submitForm(){

const feeling =
document
.getElementById('feeling')
.value
.trim()

const discovery =
document
.getElementById('discovery')
.value
.trim()

const surprise =
document
.getElementById('surprise')
.value
.trim()

const people =
document
.getElementById('people')
.value
.trim()

const ratingElement =
document.querySelector(
'input[name="rating"]:checked'
)

if(
!feeling ||
!discovery ||
!surprise ||
!people
){

alert('請完整填寫所有欄位')

return

}

if(!ratingElement){

alert('請選擇滿意度')

return

}

const rating =
ratingElement.value

const {
error
} =
await client
.from('responses')
.insert([
{
feeling,
discovery,
surprise,
people,
rating
}
])

if(error){

console.log(error)

alert(
'送出失敗：' +
error.message
)

return

}

alert('送出成功！')

document
.getElementById('feeling')
.value=''

document
.getElementById('discovery')
.value=''

document
.getElementById('surprise')
.value=''

document
.getElementById('people')
.value=''

document
.querySelectorAll(
'input[name="rating"]'
)
.forEach(
item => item.checked = false
)

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cross Round Table</title>

<style>

body{
margin:0;
padding:20px;
background:#FFF8F1;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
}

.card{
position:relative;
width:100%;
max-width:850px;

background:white;
padding:35px;

border-radius:35px;

box-shadow:0 8px 30px rgba(0,0,0,.08);

overflow:hidden;
}

.title{
font-size:55px;
font-weight:bold;
text-align:center;
color:#243B73;
margin-top:20px;
}

.subtitle{
text-align:center;
font-size:20px;
color:#666;
margin-bottom:30px;
}

.topCat{
position:absolute;
left:20px;
top:20px;
}

.topCat img{
width:170px;
}

.rightBubble{

position:absolute;
right:20px;
top:80px;

background:#FFF0D5;

padding:18px;

border-radius:25px;

width:180px;

font-size:16px;

line-height:1.6;

}

.section{

margin-bottom:25px;

}

.sectionTitle{

font-size:30px;
font-weight:bold;
margin-bottom:10px;

}

.red{
color:#FF6B6B;
}

.green{
color:#68B85F;
}

.orange{
color:#FFAA33;
}

.blue{
color:#5A8DEE;
}

textarea,input{

width:100%;
box-sizing:border-box;

padding:18px;

border-radius:20px;

border:2px solid #EFEFEF;

font-size:16px;

background:#FAFAFA;

resize:none;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:20px;

background:#243B73;

color:white;

font-size:22px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.02);

}

.footer{

margin-top:30px;

padding:20px;

background:#FFF3D9;

border-radius:20px;

text-align:center;

font-size:18px;

color:#666;

}

.footer img{

width:120px;

margin-bottom:10px;

}

@media(max-width:768px){

.title{
font-size:36px;
}

.topCat img{
width:110px;
}

.rightBubble{

position:static;
width:auto;
margin-bottom:20px;

}

}

</style>

</head>

<body>

<div class="card">

<div class="topCat">

<img src="./images/a_set_of_digital_illustration_stickers_features_si.png">

</div>

<div class="title">

CROSS ROUND TABLE

</div>

<div class="subtitle">

匿名分享今天的收穫 ☕

</div>


<div class="rightBubble">

🐱 每一次交流<br>
都可能成為未來合作的起點！

</div>


<div class="section">

<div class="sectionTitle red">

❤️ 感想

</div>

<textarea rows="4"
placeholder="今天讓你印象最深刻的是..."></textarea>

</div>


<div class="section">

<div class="sectionTitle green">

🔍 發現

</div>

<textarea rows="4"
placeholder="今天發現了什麼新的觀點..."></textarea>

</div>


<div class="section">

<div class="sectionTitle orange">

🎁 意外收穫

</div>

<textarea rows="4"
placeholder="最意外的收穫是..."></textarea>

</div>


<div class="section">

<div class="sectionTitle blue">

👥 認識到的人

</div>

<input
placeholder="部門｜關鍵字，例如：IT｜咖啡">

</div>


<button>

🎉 匿名送出

</button>


<div class="footer">

<img src="./images/a_set_of_digital_illustration_stickers_features_si.png">

<div>

🐾 今天認識的人，可能是下次合作最先想到的人 ☕

</div>

</div>

</div>

</body>

</html>

<script>

let responses = []
let currentPage = 0

function renderPage(){

if(responses.length === 0){

document.body.innerHTML = `
<h1 style="
text-align:center;
margin-top:120px;
font-size:48px;
font-family:Microsoft JhengHei;
">
目前沒有資料
</h1>
`

return

}

const item = responses[currentPage]

document.getElementById("feeling").innerText =
item["❤️ 感想"] || ""

document.getElementById("discovery").innerText =
item["🔍 發現"] || ""

document.getElementById("surprise").innerText =
item["🎁 意外收穫"] || ""

document.getElementById("people").innerText =
item["👥 認識到的人"] || ""

document.getElementById("page").innerText =
`${currentPage + 1} / ${responses.length}`

}

function nextPage(){

if(currentPage < responses.length - 1){

currentPage++

renderPage()

}

}

function prevPage(){

if(currentPage > 0){

currentPage--

renderPage()

}

}

Papa.parse(
"./responses.csv",
{

download:true,

header:true,

skipEmptyLines:true,

complete:function(results){

console.log(results.data)

responses =
results.data.filter(
r => r["❤️ 感想"]
)

renderPage()

},

error:function(error){

console.log(error)

document.body.innerHTML = `
<h1 style="
text-align:center;
margin-top:120px;
font-size:48px;
font-family:Microsoft JhengHei;
">
CSV讀取失敗
</h1>
`

}

}
)

</script>

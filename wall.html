<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

<title>Cross Round Table Wall</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
margin:0;
background:#F3F4F6;
font-family:'Noto Sans TC',sans-serif;
}

.page{
width:1400px;
max-width:95%;
min-height:850px;
margin:20px auto;
background:#FFF8F1;
padding:50px;
box-sizing:border-box;
border-radius:24px;
}

.title{
text-align:center;
font-size:58px;
font-weight:900;
letter-spacing:1px;
color:#143A84;
margin-bottom:20px;
}

.banner{
max-width:760px;
margin:0 auto 40px;
background:#FFF2D8;
padding:18px;
border-radius:999px;
text-align:center;
font-size:22px;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:26px;
}

.card{
background:white;
border-radius:32px;
padding:28px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
min-height:300px;
position:relative;
overflow:hidden;
}

.label{
font-size:36px;
font-weight:800;
margin-bottom:10px;
}

.red{color:#FF5F6D;}
.green{color:#70B84D;}
.orange{color:#FFA52B;}
.blue{color:#5A8DEE;}

.desc{
font-size:16px;
color:#666;
margin-bottom:18px;
}

.textbox{
border:3px dashed #E5E5E5;
border-radius:24px;
padding:20px;
min-height:150px;
font-size:22px;
font-weight:500;
line-height:1.8;
white-space:pre-wrap;
word-break:break-word;
overflow-wrap:break-word;
box-sizing:border-box;
}

.cat{
position:absolute;
right:18px;
bottom:18px;
width:58px;
opacity:.92;
}

.bottom{
margin-top:35px;
display:flex;
justify-content:center;
align-items:center;
gap:18px;
}

button{
background:#143A84;
color:white;
border:none;
padding:14px 26px;
border-radius:16px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}

.pageNumber{
font-size:24px;
font-weight:700;
color:#143A84;
min-width:80px;
text-align:center;
}

@media(max-width:1200px){

.page{
width:95%;
padding:24px;
}

.grid{
grid-template-columns:1fr;
}

.title{
font-size:42px;
}

.card{
min-height:240px;
}

.textbox{
font-size:18px;
}

}

@media print{

body{
background:white;
}

.page{
width:100%;
max-width:none;
margin:0;
padding:20px;
box-shadow:none;
}

.bottom{
display:none;
}

}
</style>
</head>

<body>

<div class="page">

<div class="title">
🐱 CROSS ROUND TABLE ☕
</div>

<div class="banner">
每一次交流，都可能成為未來合作的起點！
</div>

<div class="grid">

<div class="card">
<div class="label red">❤️ 感想</div>
<div class="desc">今天參加活動的感受</div>
<div class="textbox" id="feeling"></div>
<img class="cat" src="./images/cat-sleep.png">
</div>

<div class="card">
<div class="label green">🔍 發現</div>
<div class="desc">今天的新發現</div>
<div class="textbox" id="discovery"></div>
<img class="cat" src="./images/cat-search.png">
</div>

<div class="card">
<div class="label orange">🎁 意外收穫</div>
<div class="desc">今天最大的收穫</div>
<div class="textbox" id="surprise"></div>
<img class="cat" src="./images/cat-coffee.png">
</div>

<div class="card">
<div class="label blue">👥 認識到的人</div>
<div class="desc">這次交流認識的新朋友</div>
<div class="textbox" id="people"></div>
<img class="cat" src="./images/cat-happy.png">
</div>

</div>

<div class="bottom">

<button onclick="prevPage()">⬅ 上一頁</button>

<div class="pageNumber" id="page">
1 / 1
</div>

<button onclick="nextPage()">下一頁 ➡</button>

</div>

</div>

<script>

let responses = []
let currentPage = 0

function renderPage(){

if(responses.length === 0){

document.body.innerHTML = `
<h1 style="
text-align:center;
margin-top:120px;
font-size:48px;
font-family:Microsoft JhengHei;
">
目前沒有資料
</h1>
`

return

}

const item = responses[currentPage]

document.getElementById("feeling").innerText =
item["❤️ 感想"] || ""

document.getElementById("discovery").innerText =
item["🔍 發現"] || ""

document.getElementById("surprise").innerText =
item["🎁 意外收穫"] || ""

document.getElementById("people").innerText =
item["👥 認識到的人"] || ""

document.getElementById("page").innerText =
`${currentPage + 1} / ${responses.length}`

}

function nextPage(){

if(currentPage < responses.length - 1){

currentPage++
renderPage()

}

}

function prevPage(){

if(currentPage > 0){

currentPage--
renderPage()

}

}

Papa.parse("./responses.csv", {

download:true,
header:true,
skipEmptyLines:true,

complete:function(results){

console.log(results.data)

responses = results.data.filter(
r => r["❤️ 感想"]
)

renderPage()

},

error:function(error){

console.log(error)

document.body.innerHTML = `
<h1 style="
text-align:center;
margin-top:120px;
font-size:48px;
font-family:Microsoft JhengHei;
">
CSV讀取失敗
</h1>
`

}

})

</script>

</body>
</html>

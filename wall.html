<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Cross Round Table
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

@page{
size:A4 landscape;
margin:10mm;
}

body{

margin:0;

background:#FFF8F1;

font-family:
"Microsoft JhengHei",
sans-serif;

overflow:auto;

}

.wrapper{

width:100%;

display:flex;

justify-content:center;

padding:30px 0;

box-sizing:border-box;

}

.container{

width:250mm;

min-height:170mm;

background:#FFF8F1;

padding:12mm;

box-sizing:border-box;

display:flex;

flex-direction:column;

justify-content:flex-start;

}

.title{

text-align:center;

font-size:56px;

font-weight:900;

color:#143A84;

line-height:1.2;

margin-bottom:16px;

}

.banner{

background:#FFF2D8;

padding:12px;

border-radius:999px;

text-align:center;

font-size:18px;

font-weight:bold;

max-width:620px;

margin:0 auto 34px auto;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:24px;

}

.card{

background:white;

border-radius:30px;

padding:24px;

height:295px;

box-sizing:border-box;

position:relative;

box-shadow:
0 6px 18px rgba(0,0,0,.08);

}

.label{

font-size:42px;

font-weight:900;

margin-bottom:8px;

}

.red{
color:#FF5F6D;
}

.green{
color:#70B84D;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.desc{

font-size:16px;

margin-bottom:14px;

line-height:1.5;

}

.text{

height:170px;

border:3px dashed #E5E5E5;

border-radius:24px;

padding:20px;

box-sizing:border-box;

background:#FFF;

font-size:30px;

line-height:1.7;

overflow:hidden;

white-space:pre-wrap;

}

.cat{

position:absolute;

right:18px;

bottom:18px;

width:72px;

}

.bottom{

margin-top:34px;

text-align:center;

}

button{

background:#143A84;

color:white;

border:none;

padding:14px 26px;

font-size:18px;

font-weight:bold;

border-radius:18px;

cursor:pointer;

margin:0 8px;

}

.page{

margin-top:14px;

font-size:22px;

font-weight:bold;

color:#143A84;

}

@media(max-width:1100px){

.container{
width:auto;
padding:20px;
}

.grid{
grid-template-columns:1fr;
}

.card{
height:auto;
}

.text{
height:150px;
font-size:24px;
}

.title{
font-size:42px;
}

}

@media print{

body{
background:white;
}

.wrapper{
padding:0;
}

button,
.page{
display:none;
}

.container{

width:257mm;

height:170mm;

padding:8mm;

}

.card{

box-shadow:none;

border:1px solid #DDD;

height:270px;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="container">

<div class="title">

🐱 CROSS ROUND TABLE ☕

</div>

<div class="banner">

每一次交流，都可能成為未來合作的起點！

</div>


<div class="grid">

<div class="card">

<div class="label red">

❤️ 感想

</div>

<div class="desc">

今天參加活動的感受

</div>

<div class="text"
id="feeling">

載入中...

</div>

<img
class="cat"
src="./images/cat-sleep.png">

</div>



<div class="card">

<div class="label green">

🔍 發現

</div>

<div class="desc">

今天的新發現

</div>

<div class="text"
id="discovery">

載入中...

</div>

<img
class="cat"
src="./images/cat-search.png">

</div>



<div class="card">

<div class="label orange">

🎁 意外收穫

</div>

<div class="desc">

今天最大的收穫

</div>

<div class="text"
id="surprise">

載入中...

</div>

<img
class="cat"
src="./images/cat-coffee.png">

</div>



<div class="card">

<div class="label blue">

👥 認識到的人

</div>

<div class="desc">

這次交流認識的新朋友

</div>

<div class="text"
id="people">

載入中...

</div>

<img
class="cat"
src="./images/cat-happy.png">

</div>

</div>


<div class="bottom">

<button onclick="prevPage()">

⬅ 上一頁

</button>

<button onclick="nextPage()">

下一頁 ➡

</button>

<button onclick="window.print()">

🖨 列印

</button>

<div class="page"
id="page">

1 / 1

</div>

</div>

</div>

</div>


<script>

const supabaseUrl =
'https://cvnhchajerbqaalxjtjo.supabase.co'

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2bmhjaGFqZXJicWFhbHhqdGpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDg4OTksImV4cCI6MjA5NDM4NDg5OX0.7XCE9ZpG5FCkCQMV5uLPq2fJ9CgMUl-7fIrWuuq4XxU'

const client =
window.supabase.createClient(
supabaseUrl,
supabaseKey
)

let allData = []

let current = 0

async function loadData(){

const {
data,
error
} =
await client
.from('responses')
.select('*')
.order(
'id',
{
ascending:true
}
)

if(error){

alert(error.message)

return

}

allData = data || []

showPage()

}

function showPage(){

if(allData.length===0){

return

}

const item =
allData[current]

document.getElementById('feeling')
.innerText =
item.feeling || ''

document.getElementById('discovery')
.innerText =
item.discovery || ''

document.getElementById('surprise')
.innerText =
item.surprise || ''

document.getElementById('people')
.innerText =
item.people || ''

document.getElementById('page')
.innerText =
`${current+1} / ${allData.length}`

}

function nextPage(){

if(current < allData.length-1){

current++

showPage()

}

}

function prevPage(){

if(current > 0){

current--

showPage()

}

}

loadData()

</script>

</body>

</html>

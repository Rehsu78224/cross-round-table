<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>
Cross Round Table Wall
</title>

<style>

body{
margin:0;
padding:30px;
background:#FFF8F1;
font-family:Arial,sans-serif;
color:#444;
}

.title{
text-align:center;
font-size:60px;
font-weight:bold;
color:#143A84;
margin-bottom:10px;
}

.sub{
max-width:700px;
margin:0 auto 40px;
background:#FFF2D8;
padding:15px;
border-radius:25px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.wall{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.card{
background:white;
border-radius:35px;
padding:30px;
position:relative;
box-shadow:0 8px 25px rgba(0,0,0,.08);
min-height:520px;
overflow:hidden;
}

.number{
font-size:38px;
font-weight:bold;
color:#143A84;
margin-bottom:20px;
}

.section{
margin-bottom:25px;
}

.label{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.red{
color:#FF5F6D;
}

.green{
color:#5CB85C;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.text{
background:#FAFAFA;
padding:18px;
border-radius:20px;
font-size:22px;
line-height:1.7;
min-height:55px;
}

.cat{
position:absolute;
right:20px;
bottom:20px;
width:110px;
opacity:.95;
}

.footer{
text-align:center;
margin-top:50px;
font-size:24px;
font-weight:bold;
color:#143A84;
}

@media print{

body{
padding:10px;
}

.card{
break-inside:avoid;
}

}

</style>

</head>

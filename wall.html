<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cross Round Table Wall</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
margin:0;
background:#F5F5F5;
font-family:"Microsoft JhengHei",sans-serif;
}

.page{
width:1100px;
min-height:760px;
margin:30px auto;
background:#FFF8F1;
padding:40px;
box-sizing:border-box;
border-radius:20px;
}

.title{
text-align:center;
font-size:64px;
font-weight:900;
color:#143A84;
margin-bottom:20px;
}

.banner{
max-width:700px;
margin:0 auto 40px;
background:#FFF2D8;
padding:16px;
border-radius:40px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

.card{
background:white;
border-radius:30px;
padding:24px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
min-height:250px;
position:relative;
}

.label{
font-size:42px;
font-weight:bold;
margin-bottom:10px;
}

.red{color:#FF5F6D;}
.green{color:#70B84D;}
.orange{color:#FFA52B;}
.blue{color:#5A8DEE;}

.desc{
font-size:18px;
margin-bottom:14px;
}

.textbox{
border:3px dashed #E5E5E5;
border-radius:24px;
padding:22px;
min-height:120px;
font-size:34px;
line-height:1.6;
white-space:pre-wrap;
word-break:break-word;
}

.cat{
position:absolute;
right:16px;
bottom:16px;
width:70px;
}

.bottom{
margin-top:30px;
display:flex;
justify-content:center;
align-items:center;
gap:20px;
}

button{
background:#143A84;
color:white;
border:none;
padding:16px 32px;
border-radius:18px;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.pageNumber{
font-size:28px;
font-weight:bold;
color:#143A84;
}

@media(max-width:1200px){

.page{
width:95%;
padding:20px;
}

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="page">

<div class="title">
🐱 CROSS ROUND TABLE ☕
</div>

<div class="banner">
每一次交流，都可能成為未來合作的起點！
</div>

<div class="grid">

<div class="card">
<div class="label red">❤️ 感想</div>
<div class="desc">今天參加活動的感受</div>
<div class="textbox" id="feeling"></div>
<img class="cat" src="./images/cat-sleep.png">
</div>

<div class="card">
<div class="label green">🔍 發現</div>
<div class="desc">今天的新發現</div>
<div class="textbox" id="discovery"></div>
<img class="cat" src="./images/cat-search.png">
</div>

<div class="card">
<div class="label orange">🎁 意外收穫</div>
<div class="desc">今天最大的收穫</div>
<div class="textbox" id="surprise"></div>
<img class="cat" src="./images/cat-coffee.png">
</div>

<div class="card">
<div class="label blue">👥 認識到的人</div>
<div class="desc">這次交流認識的新朋友</div>
<div class="textbox" id="people"></div>
<img class="cat" src="./images/cat-happy.png">
</div>

</div>

<div class="bottom">

<button onclick="prevPage()">⬅ 上一頁</button>

<div class="pageNumber" id="page">
1 / 1
</div>

<button onclick="nextPage()">下一頁 ➡</button>

</div>

</div>

<script>

let responses = []
let currentPage = 0

function renderPage(){

if(responses.length === 0){

document.body.innerHTML = `
<h1 style="
text-align:center;
margin-top:120px;
font-size:48px;
font-family:Microsoft JhengHei;
">
目前沒有資料
</h1>
`

return

}

const item = responses[currentPage]

document.getElementById("feeling").innerText =
item["❤️ 感想"] || ""

document.getElementById("discovery").innerText =
item["🔍 發現"] || ""

document.getElementById("surprise").innerText =
item["🎁 意外收穫"] || ""

document.getElementById("people").innerText =
item["👥 認識到的人"] || ""

document.getElementById("page").innerText =
`${currentPage + 1} / ${responses.length}`

}

function nextPage(){

if(currentPage < responses.length - 1){

currentPage++
renderPage()

}

}

function prevPage(){

if(currentPage > 0){

currentPage--
renderPage()

}

}

Papa.parse("./responses.csv", {

download:true,
header:true,
skipEmptyLines:true,

complete:function(results){

console.log(results.data)

responses = results.data.filter(
r => r["❤️ 感想"]
)

renderPage()

},

error:function(error){

console.log(error)

document.body.innerHTML = `
<h1 style="
text-align:center;
margin-top:120px;
font-size:48px;
font-family:Microsoft JhengHei;
">
CSV讀取失敗
</h1>
`

}

})

</script>

</body>
</html>

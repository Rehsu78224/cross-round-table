<style>

@page{
size:A4 landscape;
margin:10mm;
}

body{

margin:0;

padding:30px;

background:#FFF8F1;

font-family:
"Microsoft JhengHei",
sans-serif;

display:flex;

justify-content:center;

box-sizing:border-box;

overflow:auto;

}

.container{

width:265mm;

min-height:180mm;

background:#FFF8F1;

padding:16mm;

box-sizing:border-box;

border-radius:24px;

display:flex;

flex-direction:column;

justify-content:flex-start;

}

.title{

text-align:center;

font-size:52px;

font-weight:900;

color:#143A84;

line-height:1.2;

margin-bottom:14px;

}

.banner{

background:#FFF2D8;

padding:11px;

border-radius:999px;

text-align:center;

font-size:16px;

font-weight:bold;

max-width:560px;

margin:0 auto 34px auto;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:24px;

}

.card{

background:white;

border-radius:30px;

padding:24px;

height:240px;

box-sizing:border-box;

position:relative;

overflow:hidden;

box-shadow:
0 4px 14px rgba(0,0,0,.08);

}

.label{

font-size:36px;

font-weight:900;

margin-bottom:10px;

}

.red{
color:#FF5F6D;
}

.green{
color:#70B84D;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.desc{

font-size:14px;

line-height:1.5;

margin-bottom:12px;

color:#333;

}

.text{

height:120px;

border:3px dashed #E3E3E3;

border-radius:22px;

padding:18px;

box-sizing:border-box;

background:white;

font-size:24px;

line-height:1.6;

overflow:hidden;

white-space:pre-wrap;

}

.cat{

position:absolute;

right:14px;

bottom:14px;

width:60px;

}

.bottom{

margin-top:30px;

text-align:center;

}

button{

background:#143A84;

color:white;

border:none;

padding:12px 24px;

font-size:16px;

font-weight:bold;

border-radius:16px;

cursor:pointer;

margin:0 8px;

transition:.2s;

}

button:hover{

transform:scale(1.05);

}

.page{

margin-top:14px;

font-size:20px;

font-weight:bold;

color:#143A84;

}

@media(max-width:1100px){

body{
padding:12px;
}

.container{

width:100%;

padding:20px;

}

.grid{

grid-template-columns:1fr;

}

.card{

height:auto;

min-height:220px;

}

.text{

height:120px;

font-size:22px;

}

.title{

font-size:40px;

}

}

@media print{

body{

padding:0;

background:white;

}

button,
.page{

display:none;

}

.container{

width:257mm;

height:170mm;

padding:10mm;

}

.grid{

gap:18px;

}

.card{

height:220px;

box-shadow:none;

border:1px solid #DDD;

}

.text{

height:110px;

font-size:22px;

}

}

</style>

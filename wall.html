<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Cross Round Table Wall
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

@page{
size:A4 landscape;
margin:10mm;
}

body{
margin:0;
background:#FFF8F1;
font-family:
"Microsoft JhengHei",
sans-serif;
}

.container{
width:277mm;
height:190mm;
margin:auto;
padding:8mm;
box-sizing:border-box;
overflow:hidden;
}

.title{
text-align:center;
font-size:24px;
font-weight:900;
color:#143A84;
margin-bottom:6px;
}

.banner{
text-align:center;
background:#FFF2D8;
padding:8px;
border-radius:30px;
font-size:12px;
font-weight:bold;
max-width:360px;
margin:auto;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:white;
border-radius:20px;
padding:14px;
position:relative;
box-shadow:
0 4px 10px rgba(0,0,0,.08);
height:235px;
box-sizing:border-box;
overflow:hidden;
}

.label{
font-size:24px;
font-weight:bold;
margin-bottom:5px;
}

.red{
color:#FF5F6D;
}

.green{
color:#70B84D;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.desc{
font-size:10px;
margin-bottom:8px;
line-height:1.4;
}

.text{
border:2px dashed #E5E5E5;
border-radius:18px;
padding:12px;
font-size:16px;
line-height:1.6;
height:130px;
overflow:hidden;
white-space:pre-wrap;
box-sizing:border-box;
background:white;
}

.cat{
position:absolute;
right:10px;
bottom:10px;
width:52px;
}

.bottom{
text-align:center;
margin-top:10px;
}

button{
background:#143A84;
color:white;
border:none;
padding:10px 24px;
font-size:14px;
font-weight:bold;
border-radius:14px;
margin:0 5px;
cursor:pointer;
}

.page{
font-size:16px;
font-weight:bold;
margin-top:6px;
color:#143A84;
}

@media print{

button,
.page{
display:none;
}

body{
background:white;
}

.container{
width:100%;
height:auto;
padding:0;
}

.card{
box-shadow:none;
border:1px solid #DDD;
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">

🐱 CROSS ROUND TABLE ☕

</div>

<div class="banner">

每一次交流，都可能成為未來合作的起點！

</div>


<div class="grid">

<div class="card">

<div class="label red">

❤️ 感想

</div>

<div class="desc">

用一句話說說，今天參加活動的感受吧！

</div>

<div
class="text"
id="feeling">

載入中...

</div>

<img
class="cat"
src="./images/cat-sleep.png">

</div>



<div class="card">

<div class="label green">

🔍 發現

</div>

<div class="desc">

今天有沒有發現以前不知道的事或觀點呢？

</div>

<div
class="text"
id="discovery">

載入中...

</div>

<img
class="cat"
src="./images/cat-search.png">

</div>



<div class="card">

<div class="label orange">

🎁 意外收穫

</div>

<div class="desc">

今天讓你覺得最意外、最有收穫的是什麼呢？

</div>

<div
class="text"
id="surprise">

載入中...

</div>

<img
class="cat"
src="./images/cat-coffee.png">

</div>



<div class="card">

<div class="label blue">

👥 認識到的人

</div>

<div class="desc">

今天認識了哪些新朋友？可以寫下名字或部門喔！

</div>

<div
class="text"
id="people">

載入中...

</div>

<img
class="cat"
src="./images/cat-happy.png">

</div>

</div>



<div class="bottom">

<button onclick="prevPage()">

⬅ 上一頁

</button>

<button onclick="nextPage()">

下一頁 ➡

</button>

<button onclick="window.print()">

🖨 列印

</button>

<div
class="page"
id="page">

1 / 1

</div>

</div>

</div>


<script>

const supabaseUrl =
'https://cvnhchajerbqaalxjtjo.supabase.co'

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2bmhjaGFqZXJicWFhbHhqdGpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDg4OTksImV4cCI6MjA5NDM4NDg5OX0.7XCE9ZpG5FCkCQMV5uLPq2fJ9CgMUl-7fIrWuuq4XxU'

const client =
window.supabase.createClient(
supabaseUrl,
supabaseKey
)

let allData = []

let current = 0

async function loadData(){

const {
data,
error
} =
await client
.from('responses')
.select('*')
.order(
'id',
{
ascending:true
}
)

if(error){

alert(error.message)

return

}

if(!data || data.length===0){

document.getElementById('feeling')
.innerText='目前沒有資料'

document.getElementById('discovery')
.innerText='目前沒有資料'

document.getElementById('surprise')
.innerText='目前沒有資料'

document.getElementById('people')
.innerText='目前沒有資料'

return

}

allData = data

showPage()

}

function showPage(){

const item =
allData[current]

document.getElementById('feeling')
.innerText =
item.feeling || ''

document.getElementById('discovery')
.innerText =
item.discovery || ''

document.getElementById('surprise')
.innerText =
item.surprise || ''

document.getElementById('people')
.innerText =
item.people || ''

document.getElementById('page')
.innerText =
`${current+1} / ${allData.length}`

}

function nextPage(){

if(current < allData.length-1){

current++

showPage()

}

}

function prevPage(){

if(current > 0){

current--

showPage()

}

}

loadData()

</script>

</body>

</html>

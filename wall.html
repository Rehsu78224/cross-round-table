<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Cross Round Table Wall
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
padding:30px;
background:#FFF8F1;
font-family:
"Microsoft JhengHei",
sans-serif;
}

.title{
text-align:center;
font-size:64px;
font-weight:900;
color:#143A84;
margin-bottom:15px;
}

.banner{
text-align:center;
font-size:22px;
background:#FFF2D8;
padding:14px 24px;
border-radius:40px;
max-width:720px;
margin:auto;
margin-bottom:50px;
font-weight:bold;
}

.wall{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.card{
background:#FFFFFF;
border-radius:35px;
padding:30px;
position:relative;
box-shadow:
0 10px 30px rgba(0,0,0,.08);
overflow:hidden;
break-inside:avoid;
}

.number{
font-size:32px;
font-weight:bold;
color:#143A84;
margin-bottom:25px;
}

.section{
margin-bottom:24px;
}

.label{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.red{
color:#FF5F6D;
}

.green{
color:#5CB85C;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.text{
background:#FAFAFA;
padding:18px;
border-radius:22px;
font-size:20px;
line-height:1.8;
white-space:pre-wrap;
min-height:60px;
}

.cat{
position:absolute;
right:15px;
bottom:15px;
width:85px;
opacity:.95;
}

.footer{
text-align:center;
margin-top:50px;
font-size:24px;
font-weight:bold;
color:#143A84;
}

.loading{
text-align:center;
font-size:28px;
font-weight:bold;
padding:80px;
color:#143A84;
}

.error{
text-align:center;
font-size:24px;
font-weight:bold;
padding:80px;
color:red;
}

@media(max-width:900px){

.wall{
grid-template-columns:1fr;
}

.title{
font-size:42px;
}

}

@media print{

body{
padding:10px;
background:white;
}

.card{
break-inside:avoid;
box-shadow:none;
border:1px solid #DDD;
}

}

</style>

</head>

<body>

<div class="title">

🐱 CROSS ROUND TABLE ☕

</div>

<div class="banner">

每一次交流，都可能成為未來合作的起點！

</div>

<div
class="wall"
id="wall">

<div class="loading">

資料載入中...

</div>

</div>

<div class="footer">

✨ Cross Round Table Vol.01 ✨

</div>

<script>

const supabaseUrl =
'https://cvnhchajerbqaalxjtjo.supabase.co'

const supabaseKey =
'https://cvnhchajerbqaalxjtjo.supabase.co'

const supabaseAnonKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2bmhjaGFqZXJicWFhbHhqdGpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDg4OTksImV4cCI6MjA5NDM4NDg5OX0.7XCE9ZpG5FCkCQMV5uLPq2fJ9CgMUl-7fIrWuuq4XxU'

const client =
window.supabase.createClient(
supabaseUrl,
supabaseAnonKey
)

async function loadData(){

const wall =
document.getElementById('wall')

try{

const {
data,
error
} =
await client
.from('responses')
.select('*')
.order(
'id',
{
ascending:false
}
)

if(error){

throw error

}

if(!data || data.length===0){

wall.innerHTML = `

<div class="loading">

目前還沒有投稿資料

</div>

`

return

}

wall.innerHTML=''

data.forEach((item,index)=>{

wall.innerHTML += `

<div class="card">

<div class="number">

#${index+1}

</div>

<div class="section">

<div class="label red">

❤️ 感想

</div>

<div class="text">

${item.feeling || ''}

</div>

</div>

<div class="section">

<div class="label green">

🔍 發現

</div>

<div class="text">

${item.discovery || ''}

</div>

</div>

<div class="section">

<div class="label orange">

🎁 意外收穫

</div>

<div class="text">

${item.surprise || ''}

</div>

</div>

<div class="section">

<div class="label blue">

👥 認識到的人

</div>

<div class="text">

${item.people || ''}

</div>

</div>

<img
class="cat"
src="./images/cat-happy.png">

</div>

`

})

}catch(err){

console.log(err)

wall.innerHTML = `

<div class="error">

讀取失敗<br><br>

${err.message}

</div>

`

}

}

loadData()

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Cross Round Table Wall
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

@page{
size:A4 landscape;
margin:12mm;
}

body{
margin:0;
background:#FFF8F1;
font-family:
"Microsoft JhengHei",
sans-serif;
overflow-y:auto;
}

.container{

width:257mm;
min-height:170mm;

margin:30px auto;

padding:18mm;

box-sizing:border-box;

display:flex;
flex-direction:column;
justify-content:center;

}

.title{
text-align:center;
font-size:52px;
font-weight:900;
color:#143A84;
margin-bottom:14px;
}

.banner{
text-align:center;
background:#FFF2D8;
padding:12px;
border-radius:40px;
font-size:18px;
font-weight:bold;
max-width:620px;
margin:auto;
margin-bottom:34px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:22px;
}

.card{

background:white;

border-radius:30px;

padding:22px;

position:relative;

box-shadow:
0 6px 18px rgba(0,0,0,.08);

height:255px;

box-sizing:border-box;

overflow:hidden;

}

.label{
font-size:40px;
font-weight:bold;
margin-bottom:8px;
}

.red{
color:#FF5F6D;
}

.green{
color:#70B84D;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.desc{
font-size:15px;
margin-bottom:14px;
line-height:1.5;
}

.text{

border:3px dashed #E5E5E5;

border-radius:24px;

padding:18px;

font-size:28px;

line-height:1.7;

height:150px;

overflow:auto;

white-space:pre-wrap;

box-sizing:border-box;

background:white;

}

.cat{
position:absolute;
right:16px;
bottom:16px;
width:68px;
}

.bottom{
text-align:center;
margin-top:30px;
padding-bottom:20px;
}

button{
background:#143A84;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
font-weight:bold;
border-radius:18px;
margin:0 8px;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.page{
font-size:22px;
font-weight:bold;
margin-top:16px;
color:#143A84;
}

@media(max-width:1100px){

.container{
width:auto;
padding:20px;
}

.grid{
grid-template-columns:1fr;
}

.title{
font-size:40px;
}

.label{
font-size:34px;
}

.text{
font-size:22px;
height:140px;
}

button{
width:100%;
margin-top:12px;
}

}

@media print{

button,
.page{
display:none;
}

body{
background:white;
}

.container{

width:257mm;
height:170mm;

margin:auto;

padding:14mm;

display:flex;
justify-content:center;

}

.grid{
gap:16px;
}

.card{

height:235px;

box-shadow:none;

border:1px solid #DDD;

}

}

</style>

</head>

<body>

<div class="container">

<div class="title">

🐱 CROSS ROUND TABLE ☕

</div>

<div class="banner">

每一次交流，都可能成為未來合作的起點！

</div>


<div class="grid">

<div class="card">

<div class="label red">

❤️ 感想

</div>

<div class="desc">

用一句話說說，今天參加活動的感受吧！

</div>

<div
class="text"
id="feeling">

載入中...

</div>

<img
class="cat"
src="./images/cat-sleep.png">

</div>



<div class="card">

<div class="label green">

🔍 發現

</div>

<div class="desc">

今天有沒有發現以前不知道的事或觀點呢？

</div>

<div
class="text"
id="discovery">

載入中...

</div>

<img
class="cat"
src="./images/cat-search.png">

</div>



<div class="card">

<div class="label orange">

🎁 意外收穫

</div>

<div class="desc">

今天讓你覺得最意外、最有收穫的是什麼呢？

</div>

<div
class="text"
id="surprise">

載入中...

</div>

<img
class="cat"
src="./images/cat-coffee.png">

</div>



<div class="card">

<div class="label blue">

👥 認識到的人

</div>

<div class="desc">

今天認識了哪些新朋友？可以寫下名字或部門喔！

</div>

<div
class="text"
id="people">

載入中...

</div>

<img
class="cat"
src="./images/cat-happy.png">

</div>

</div>



<div class="bottom">

<button onclick="prevPage()">

⬅ 上一頁

</button>

<button onclick="nextPage()">

下一頁 ➡

</button>

<button onclick="window.print()">

🖨 列印

</button>

<div
class="page"
id="page">

1 / 1

</div>

</div>

</div>


<script>

const supabaseUrl =
'https://cvnhchajerbqaalxjtjo.supabase.co'

const supabaseKey =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInR5cCI6IkpXVCJ9'

const client =
window.supabase.createClient(
supabaseUrl,
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2bmhjaGFqZXJicWFhbHhqdGpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDg4OTksImV4cCI6MjA5NDM4NDg5OX0.7XCE9ZpG5FCkCQMV5uLPq2fJ9CgMUl-7fIrWuuq4XxU'
)

let allData = []

let current = 0

async function loadData(){

const {
data,
error
} =
await client
.from('responses')
.select('*')
.order(
'id',
{
ascending:true
}
)

if(error){

alert(error.message)

return

}

if(!data || data.length===0){

document.getElementById('feeling')
.innerText='目前沒有資料'

document.getElementById('discovery')
.innerText='目前沒有資料'

document.getElementById('surprise')
.innerText='目前沒有資料'

document.getElementById('people')
.innerText='目前沒有資料'

return

}

allData = data

showPage()

}

function showPage(){

const item =
allData[current]

document.getElementById('feeling')
.innerText =
item.feeling || ''

document.getElementById('discovery')
.innerText =
item.discovery || ''

document.getElementById('surprise')
.innerText =
item.surprise || ''

document.getElementById('people')
.innerText =
item.people || ''

document.getElementById('page')
.innerText =
`${current+1} / ${allData.length}`

window.scrollTo({
top:0,
behavior:'smooth'
})

}

function nextPage(){

if(current < allData.length-1){

current++

showPage()

}

}

function prevPage(){

if(current > 0){

current--

showPage()

}

}

loadData()

</script>

</body>

</html>

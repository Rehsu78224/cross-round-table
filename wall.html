<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Cross Round Table Wall
</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
padding:30px;
background:#FFF8F1;
font-family:Arial,sans-serif;
}

.title{
text-align:center;
font-size:60px;
font-weight:bold;
color:#143A84;
margin-bottom:10px;
}

.banner{
text-align:center;
font-size:22px;
background:#FFF2D8;
padding:14px;
border-radius:30px;
max-width:700px;
margin:auto;
margin-bottom:40px;
font-weight:bold;
}

.wall{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.card{
background:white;
border-radius:35px;
padding:25px;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,.08);
break-inside:avoid;
}

.number{
font-size:32px;
font-weight:bold;
color:#143A84;
margin-bottom:20px;
}

.section{
margin-bottom:20px;
}

.label{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.red{
color:#FF5F6D;
}

.green{
color:#5CB85C;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.text{
background:#FAFAFA;
padding:18px;
border-radius:20px;
font-size:20px;
line-height:1.8;
white-space:pre-wrap;
}

.cat{
position:absolute;
right:15px;
bottom:15px;
width:80px;
opacity:.95;
}

@media(max-width:900px){

.wall{
grid-template-columns:1fr;
}

.title{
font-size:42px;
}

}

@media print{

body{
padding:0;
}

.card{
break-inside:avoid;
}

}

</style>

</head>

<body>

<div class="title">

🐱 CROSS ROUND TABLE ☕

</div>

<div class="banner">

每一次交流，都可能成為未來合作的起點！

</div>

<div class="wall" id="wall">

</div>


<script>

const supabaseUrl =
'https://cvnhchajerbqaalxjtjo.supabase.co'

const supabaseKey =
'你的 anon key'

const supabaseClient =
supabase.createClient(
supabaseUrl,
supabaseKey
)

async function loadData(){

const { data , error } =
await supabaseClient
.from('responses')
.select('*')
.order('id',{ascending:false})

if(error){

console.log(error)
return

}

const wall =
document.getElementById('wall')

wall.innerHTML=''

data.forEach((item,index)=>{

wall.innerHTML += `

<div class="card">

<div class="number">

#${index+1}

</div>

<div class="section">

<div class="label red">

❤️ 感想

</div>

<div class="text">

${item.feeling}

</div>

</div>


<div class="section">

<div class="label green">

🔍 發現

</div>

<div class="text">

${item.discovery}

</div>

</div>


<div class="section">

<div class="label orange">

🎁 意外收穫

</div>

<div class="text">

${item.surprise}

</div>

</div>


<div class="section">

<div class="label blue">

👥 認識到的人

</div>

<div class="text">

${item.people}

</div>

</div>

<img class="cat"
src="./images/cat-coffee.png">

</div>

`

})

}

loadData()

</script>

</body>

</html>

<style>

@page{
size:A4 portrait;
margin:10mm;
}

body{

margin:0;

background:#FFF8F1;

font-family:
"Microsoft JhengHei",
sans-serif;

display:flex;

justify-content:center;

padding:20px;

box-sizing:border-box;

overflow:auto;

}

.container{

width:190mm;

min-height:257mm;

background:#FFF8F1;

padding:12mm;

box-sizing:border-box;

display:flex;

flex-direction:column;

justify-content:flex-start;

}

.title{

text-align:center;

font-size:42px;

font-weight:900;

color:#143A84;

line-height:1.2;

margin-bottom:14px;

}

.banner{

background:#FFF2D8;

padding:12px;

border-radius:999px;

text-align:center;

font-size:16px;

font-weight:bold;

max-width:480px;

margin:0 auto 28px auto;

}

.grid{

display:grid;

grid-template-columns:1fr;

gap:20px;

}

.card{

background:white;

border-radius:28px;

padding:22px;

height:240px;

box-sizing:border-box;

position:relative;

overflow:hidden;

box-shadow:
0 4px 14px rgba(0,0,0,.08);

}

.label{

font-size:34px;

font-weight:900;

margin-bottom:8px;

}

.red{
color:#FF5F6D;
}

.green{
color:#70B84D;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.desc{

font-size:14px;

margin-bottom:12px;

line-height:1.5;

color:#444;

}

.text{

height:120px;

border:3px dashed #E3E3E3;

border-radius:22px;

padding:18px;

box-sizing:border-box;

background:white;

font-size:24px;

line-height:1.6;

white-space:pre-wrap;

overflow:hidden;

}

.cat{

position:absolute;

right:16px;

bottom:16px;

width:60px;

}

.bottom{

margin-top:28px;

text-align:center;

}

button{

background:#143A84;

color:white;

border:none;

padding:12px 24px;

font-size:16px;

font-weight:bold;

border-radius:16px;

cursor:pointer;

margin:0 8px;

}

.page{

margin-top:12px;

font-size:18px;

font-weight:bold;

color:#143A84;

}

@media print{

body{

padding:0;

background:white;

}

button,
.page{

display:none;

}

.container{

width:190mm;

height:277mm;

padding:10mm;

}

.card{

box-shadow:none;

border:1px solid #DDD;

}

}

</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

let allData = []

let current = 0

async function loadData(){

Papa.parse(
'responses.csv',
{
download:true,
header:true,

complete:function(results){

allData =
results.data.filter(
item =>
item.感想 ||
item.發現
)

showPage()

}

}
)

}

function showPage(){

if(allData.length===0){

return

}

const item =
allData[current]

document.getElementById('feeling')
.innerText =
item['感想'] || ''

document.getElementById('discovery')
.innerText =
item['發現'] || ''

document.getElementById('surprise')
.innerText =
item['意外收穫'] || ''

document.getElementById('people')
.innerText =
item['認識到的人'] || ''

document.getElementById('page')
.innerText =
`${current+1} / ${allData.length}`

}

function nextPage(){

if(current < allData.length-1){

current++

showPage()

}

}

function prevPage(){

if(current > 0){

current--

showPage()

}

}

loadData()

</script>

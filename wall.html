<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>
Cross Round Table Wall
</title>

<style>

body{
margin:0;
padding:30px;
background:#FFF8F1;
font-family:Arial,sans-serif;
}

.title{
font-size:56px;
font-weight:bold;
color:#143A84;
text-align:center;
margin-bottom:10px;
}

.sub{
text-align:center;
background:#FFF2D8;
padding:12px;
border-radius:20px;
max-width:600px;
margin:0 auto 40px;
font-weight:bold;
}

.wall{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.card{
background:white;
border-radius:30px;
padding:25px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
position:relative;
min-height:420px;
}

.card h2{
margin-top:0;
font-size:30px;
color:#143A84;
}

.section{
margin-bottom:18px;
}

.label{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
}

.red{
color:#FF5F6D;
}

.green{
color:#5CB85C;
}

.orange{
color:#FFA52B;
}

.blue{
color:#5A8DEE;
}

.text{
background:#FAFAFA;
padding:15px;
border-radius:18px;
line-height:1.7;
font-size:18px;
}

.cat{
position:absolute;
right:20px;
bottom:15px;
width:75px;
opacity:.95;
}

@media print{

body{
padding:0;
}

.card{
break-inside:avoid;
}

}

</style>

</head>

<body>

<div class="title">

🐱 CROSS ROUND TABLE Vol.01 ☕

</div>

<div class="sub">

每一次交流，都可能成為未來合作的起點！

</div>

<div class="wall">


<!-- 卡片1 -->

<div class="card">

<h2>#01</h2>

</div>

<div class="text">

</div>


<div class="section">

</div>

<div class="text">

</div>

</div>


<div class="section">

<div class="label orange">
🎁 意外收穫
</div>

<div class="text">
cc
</div>

</div>


<div class="section">

<div class="label blue">
👥 認識到的人
</div>

<div class="text">
dd
</div>

</div>

<img class="cat"
src="./images/cat-happy.png">

</div>



<!-- 卡片2 -->

<div class="card">

<h2>#02</h2>

<div class="section">

<div class="label red">

</div>

<div class="section">

<div class="section">

<div class="label blue">

</div>

<img class="cat"
src="./images/cat-search.png">

</div>


</div>

</body>

</html>
